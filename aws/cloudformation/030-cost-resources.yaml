AWSTemplateFormatVersion: '2010-09-09'
Description: 'Cost-sensitive resources: NAT Gateway and ALB'

Parameters:
  ProjectName:
    Type: String
    Default: my-project

Resources:
  # --- NAT Gateway 関連 ---
  # 固定IP (EIP)
  NatEip:
    Type: AWS::EC2::Eip
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-nat-eip

  # NAT Gateway 本体 (節約のため1つ作成して共有する構成。AZ間通信がかかるが、基本イメージpullにしか使わない。)
  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      # VPCスタックで作成した最初のパブリックサブネットに配置
      SubnetId: !Select [ 0, !Split [",", !ImportValue { "Fn::Sub": "${ProjectName}-PublicSubnets" } ] ]
      AllocationId: !GetAtt NatEip.AllocationId
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-nat-gw

  # --- プライベート用ルートテーブルの変更 ---
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !ImportValue { "Fn::Sub": "${ProjectName}-VPCID" }
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-private-rt

  # デフォルトルートをNAT Gatewayに向ける
  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  # プライベートサブネットをこのルートテーブルに関連付け
  # (VPCスタックで作成したサブネットIDを順に適用)
  PrivateSubnet1Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Select [ 0, !Split [",", !ImportValue { "Fn::Sub": "${ProjectName}-PrivateSubnets" } ] ]
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Select [ 1, !Split [",", !ImportValue { "Fn::Sub": "${ProjectName}-PrivateSubnets" } ] ]
      RouteTableId: !Ref PrivateRouteTable

  # --- ALB (Application Load Balancer) 関連 ---
  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${ProjectName}-alb
      Scheme: internet-facing
      # アプリスタックで作成したALB用SGをインポート
      SecurityGroups:
        - !ImportValue { "Fn::Sub": "${ProjectName}-AlbSecurityGroup" }
      Subnets: !Split [",", !ImportValue { "Fn::Sub": "${ProjectName}-PublicSubnets" } ]
      Type: application

  # ALB リスナー (HTTP 80)
  AlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          # アプリスタックで作成したターゲットグループへ転送
          TargetGroupArn: !ImportValue { "Fn::Sub": "${ProjectName}-TargetGroupArn" }

Outputs:
  AlbDnsName:
    Description: "DNS Name of the ALB"
    Value: !GetAtt LoadBalancer.DNSName
    Export:
      Name: !Sub ${ProjectName}-AlbDnsName
