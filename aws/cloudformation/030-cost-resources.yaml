AWSTemplateFormatVersion: '2010-09-09'
Description: 'Cost-sensitive resources: NAT Gateway and ALB'

Parameters:
  ProjectName:
    Type: String
    Default: memo
    Description: Project name used for naming and importing

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Configuration
        Parameters:
          - ProjectName

Resources:
  # --- NAT Gateway 関連 ---
  # 固定IP (EIP)
  NatEip:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-nat-eip

  # NAT Gateway 本体 (節約のため1つ作成して共有する構成。AZ間通信がかかるが、基本イメージpullにしか使わない。)
  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      # VPCスタックで作成した最初のパブリックサブネットに配置
      SubnetId: !Select [ 0, !Split [",", !ImportValue { "Fn::Sub": "${ProjectName}-PublicSubnets" } ] ]
      AllocationId: !GetAtt NatEip.AllocationId
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-nat-gw

  # プライベート用ルートテーブルの変更（NAT Gatewayに向ける）
  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !ImportValue { "Fn::Sub": "${ProjectName}-PrivateRouteTableId" }
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  # --- ALB (Application Load Balancer) 関連 ---
  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${ProjectName}-alb
      Scheme: internet-facing
      # アプリスタックで作成したALB用SGをインポート
      SecurityGroups:
        - !ImportValue { "Fn::Sub": "${ProjectName}-AlbSecurityGroup" }
      Subnets: !Split [",", !ImportValue { "Fn::Sub": "${ProjectName}-PublicSubnets" } ]
      Type: application

  # ALB リスナー (HTTP 80)
  AlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          # アプリスタックで作成したターゲットグループへ転送
          TargetGroupArn: !ImportValue { "Fn::Sub": "${ProjectName}-TargetGroupArn" }

Outputs:
  AlbDnsName:
    Description: "DNS Name of the ALB"
    Value: !GetAtt LoadBalancer.DNSName
    Export:
      Name: !Sub ${ProjectName}-AlbDnsName
